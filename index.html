<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>卡牌每日養成 · 自動戰鬥</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🃏</text></svg>"
    />
  </head>
  <body>
    <div id="app">
      <!-- 主城大廳制：主城為樞紐，各功能頁全螢幕切換（router.js） -->
      <main id="screens">
        <section id="screen-home" class="screen"></section>
        <section id="screen-team" class="screen"></section>
        <section id="screen-heroes" class="screen"></section>
        <section id="screen-gacha" class="screen"></section>
        <section id="screen-arena" class="screen"></section>
        <section id="screen-friends" class="screen"></section>
        <section id="screen-guild" class="screen"></section>
        <section id="screen-tower" class="screen"></section>
        <section id="screen-shop" class="screen"></section>
        <section id="screen-battle" class="screen">
          <div id="battle-canvas"></div>
          <div id="battle-overlay"></div>
        </section>
      </main>
      <!-- 彈窗層：在 store 重繪範圍之外 -->
      <div id="overlay-root"></div>
      <!-- 直向提示：橫向遊戲 -->
      <div id="rotate-hint">
        <div class="rh-icon">📱</div>
        <div class="rh-text">請將裝置轉為橫向遊玩</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
