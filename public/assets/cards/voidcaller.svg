<svg xmlns="http://www.w3.org/2000/svg" width="640" height="880" viewBox="0 0 640 880">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241436"/>
      <stop offset="0.55" stop-color="#4a2b6e"/>
      <stop offset="1" stop-color="#241436"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#c99aff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#c99aff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#c99aff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#c99aff"/>
      <stop offset="1" stop-color="#4a2b6e"/>
    </linearGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221a3c"/>
      <stop offset="1" stop-color="#120e22"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glowF" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="640" height="880" fill="url(#bg)"/>
  <path d="M0 610 L150 470 L300 600 L450 480 L640 615 Z" fill="#000" opacity="0.28"/>
  <ellipse cx="320" cy="400" rx="250" ry="270" fill="url(#halo)"/>

  <!-- 地面霧光 -->
  <ellipse cx="320" cy="712" rx="300" ry="58" fill="#c99aff" opacity="0.1" filter="url(#soft)"/>

  <!-- 人物剪影 -->
  <g>
    <path d="M320 268 C246 284 210 356 200 470 C190 588 206 648 228 672 L412 672 C434 648 450 588 440 470 C430 356 394 284 320 268 Z"
          fill="url(#cloak)"/>
    <path d="M376 262 C416 310 442 386 440 470 C438 520 432 560 424 592"
          stroke="#c99aff" stroke-width="7" fill="none" opacity="0.5" filter="url(#glowS)" stroke-linecap="round"/>
    
    <path d="M228 500 L412 476" stroke="#c99aff" stroke-width="9" opacity="0.4" stroke-linecap="round"/>
    <circle cx="320" cy="298" r="60" fill="url(#cloak)"/>
    <ellipse cx="320" cy="312" rx="42" ry="47" fill="#0c0918"/>
    <circle cx="301" cy="314" r="8" fill="#c99aff" filter="url(#glowF)"/>
    <circle cx="339" cy="314" r="8" fill="#c99aff" filter="url(#glowF)"/>
    
  </g>
  
    <g transform="rotate(2 452 460)">
      <path d="M452 300 C520 360 520 560 452 620" fill="none" stroke="#241b3d" stroke-width="13" stroke-linecap="round"/>
      <path d="M452 300 C520 360 520 560 452 620" fill="none" stroke="#c99aff" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
      <line x1="452" y1="300" x2="452" y2="620" stroke="#e6ccff" stroke-width="3" opacity="0.8"/>
      <line x1="392" y1="460" x2="486" y2="460" stroke="#e6ccff" stroke-width="6" stroke-linecap="round"/>
      <path d="M486 460 L462 448 L462 472 Z" fill="#c99aff" filter="url(#glowS)"/>
    </g>
  <circle cx="275" cy="447" r="4.3" fill="#e6ccff" opacity="0.25"/><circle cx="185" cy="494" r="2.7" fill="#e6ccff" opacity="0.60"/><circle cx="288" cy="135" r="2.3" fill="#e6ccff" opacity="0.50"/><circle cx="371" cy="631" r="2.0" fill="#e6ccff" opacity="0.36"/><circle cx="391" cy="439" r="1.5" fill="#e6ccff" opacity="0.26"/><circle cx="450" cy="546" r="4.0" fill="#e6ccff" opacity="0.31"/><circle cx="218" cy="612" r="2.1" fill="#e6ccff" opacity="0.28"/><circle cx="364" cy="619" r="1.7" fill="#e6ccff" opacity="0.44"/><circle cx="309" cy="683" r="3.0" fill="#e6ccff" opacity="0.34"/><circle cx="166" cy="252" r="2.7" fill="#e6ccff" opacity="0.46"/><circle cx="357" cy="432" r="4.8" fill="#e6ccff" opacity="0.48"/><circle cx="320" cy="165" r="3.9" fill="#e6ccff" opacity="0.44"/><circle cx="155" cy="510" r="3.7" fill="#e6ccff" opacity="0.31"/><circle cx="204" cy="236" r="2.3" fill="#e6ccff" opacity="0.45"/>
  <rect width="640" height="880" fill="url(#vig)"/>
</svg>
