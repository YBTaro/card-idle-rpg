<svg xmlns="http://www.w3.org/2000/svg" width="640" height="880" viewBox="0 0 640 880">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#122a4a"/>
      <stop offset="0.55" stop-color="#2b5a8f"/>
      <stop offset="1" stop-color="#122a4a"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#7cc4ff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#7cc4ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7cc4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#7cc4ff"/>
      <stop offset="1" stop-color="#2b5a8f"/>
    </linearGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221a3c"/>
      <stop offset="1" stop-color="#120e22"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glowF" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="640" height="880" fill="url(#bg)"/>
  
      <path d="M0 590 Q80 555 160 590 T320 590 T480 590 T640 590 L640 660 L0 660 Z" fill="#000" opacity="0.3"/>
      <path d="M0 640 Q100 600 200 640 T400 640 T640 640 L640 730 L0 730 Z" fill="#000" opacity="0.42"/>
  <ellipse cx="320" cy="400" rx="250" ry="270" fill="url(#halo)"/>

  <!-- 地面霧光 -->
  <ellipse cx="320" cy="712" rx="300" ry="58" fill="#7cc4ff" opacity="0.1" filter="url(#soft)"/>

  <!-- 人物剪影 -->
  <g>
    <path d="M320 268 C246 284 210 356 200 470 C190 588 206 648 228 672 L412 672 C434 648 450 588 440 470 C430 356 394 284 320 268 Z"
          fill="url(#cloak)"/>
    <path d="M376 262 C416 310 442 386 440 470 C438 520 432 560 424 592"
          stroke="#7cc4ff" stroke-width="7" fill="none" opacity="0.5" filter="url(#glowS)" stroke-linecap="round"/>
    <circle cx="320" cy="298" r="60" fill="url(#cloak)"/>
    <ellipse cx="320" cy="312" rx="42" ry="47" fill="#0c0918"/>
    <circle cx="301" cy="314" r="8" fill="#7cc4ff" filter="url(#glowF)"/>
    <circle cx="339" cy="314" r="8" fill="#7cc4ff" filter="url(#glowF)"/>
    
  </g>
  
  <g transform="rotate(-24 440 470)">
    <rect x="432" y="200" width="17" height="250" rx="8" fill="url(#blade)" filter="url(#glowS)"/>
    <path d="M432 200 L440 172 L449 200 Z" fill="url(#blade)"/>
    <rect x="405" y="448" width="70" height="15" rx="7" fill="#b3e6ff"/>
    <rect x="433" y="462" width="15" height="52" rx="7" fill="#241b3d"/>
    <circle cx="440" cy="522" r="10" fill="#7cc4ff"/>
  </g>
  <circle cx="545" cy="481" r="2.8" fill="#b3e6ff" opacity="0.34"/><circle cx="565" cy="94" r="3.3" fill="#b3e6ff" opacity="0.22"/><circle cx="184" cy="147" r="3.8" fill="#b3e6ff" opacity="0.22"/><circle cx="456" cy="491" r="2.8" fill="#b3e6ff" opacity="0.36"/><circle cx="374" cy="519" r="2.1" fill="#b3e6ff" opacity="0.31"/><circle cx="599" cy="576" r="4.1" fill="#b3e6ff" opacity="0.38"/><circle cx="214" cy="441" r="4.8" fill="#b3e6ff" opacity="0.67"/><circle cx="81" cy="697" r="4.7" fill="#b3e6ff" opacity="0.58"/><circle cx="576" cy="375" r="2.8" fill="#b3e6ff" opacity="0.36"/><circle cx="209" cy="615" r="3.3" fill="#b3e6ff" opacity="0.24"/><circle cx="508" cy="239" r="3.8" fill="#b3e6ff" opacity="0.57"/><circle cx="231" cy="283" r="3.3" fill="#b3e6ff" opacity="0.56"/><circle cx="130" cy="101" r="3.0" fill="#b3e6ff" opacity="0.46"/><circle cx="233" cy="493" r="1.5" fill="#b3e6ff" opacity="0.56"/>
  <rect width="640" height="880" fill="url(#vig)"/>
</svg>
