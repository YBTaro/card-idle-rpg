<svg xmlns="http://www.w3.org/2000/svg" width="640" height="880" viewBox="0 0 640 880">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14322a"/>
      <stop offset="0.55" stop-color="#2e6b4f"/>
      <stop offset="1" stop-color="#14322a"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#8ef2ae" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#8ef2ae" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8ef2ae" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#8ef2ae"/>
      <stop offset="1" stop-color="#2e6b4f"/>
    </linearGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221a3c"/>
      <stop offset="1" stop-color="#120e22"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glowF" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="640" height="880" fill="url(#bg)"/>
  
      <path d="M0 600 C120 520 240 555 340 545 C460 530 560 560 640 540 L640 660 L0 660 Z" fill="#000" opacity="0.3"/>
      <path d="M0 660 C150 600 320 640 470 615 C560 600 610 615 640 610 L640 720 L0 720 Z" fill="#000" opacity="0.42"/>
      <path d="M60 470 C160 440 220 470 320 452" stroke="#8ef2ae" stroke-width="5" fill="none" opacity="0.25" stroke-linecap="round"/>
      <path d="M330 500 C430 472 500 500 590 482" stroke="#8ef2ae" stroke-width="4" fill="none" opacity="0.18" stroke-linecap="round"/>
  <ellipse cx="320" cy="400" rx="250" ry="270" fill="url(#halo)"/>

  <!-- 地面霧光 -->
  <ellipse cx="320" cy="712" rx="300" ry="58" fill="#8ef2ae" opacity="0.1" filter="url(#soft)"/>

  <!-- 人物剪影 -->
  <g>
    <path d="M320 268 C246 284 210 356 200 470 C190 588 206 648 228 672 L412 672 C434 648 450 588 440 470 C430 356 394 284 320 268 Z"
          fill="url(#cloak)"/>
    <path d="M376 262 C416 310 442 386 440 470 C438 520 432 560 424 592"
          stroke="#8ef2ae" stroke-width="7" fill="none" opacity="0.5" filter="url(#glowS)" stroke-linecap="round"/>
    <circle cx="320" cy="298" r="60" fill="url(#cloak)"/>
    <ellipse cx="320" cy="312" rx="42" ry="47" fill="#0c0918"/>
    <circle cx="301" cy="314" r="8" fill="#8ef2ae" filter="url(#glowF)"/>
    <circle cx="339" cy="314" r="8" fill="#8ef2ae" filter="url(#glowF)"/>
    
  </g>
  
  <g transform="rotate(-24 440 470)">
    <rect x="432" y="200" width="17" height="250" rx="8" fill="url(#blade)" filter="url(#glowS)"/>
    <path d="M432 200 L440 172 L449 200 Z" fill="url(#blade)"/>
    <rect x="405" y="448" width="70" height="15" rx="7" fill="#d8ffb0"/>
    <rect x="433" y="462" width="15" height="52" rx="7" fill="#241b3d"/>
    <circle cx="440" cy="522" r="10" fill="#8ef2ae"/>
  </g>
  <circle cx="219" cy="442" r="3.5" fill="#d8ffb0" opacity="0.23"/><circle cx="368" cy="84" r="4.2" fill="#d8ffb0" opacity="0.39"/><circle cx="147" cy="466" r="2.7" fill="#d8ffb0" opacity="0.68"/><circle cx="336" cy="97" r="1.6" fill="#d8ffb0" opacity="0.67"/><circle cx="46" cy="438" r="4.0" fill="#d8ffb0" opacity="0.46"/><circle cx="229" cy="493" r="4.9" fill="#d8ffb0" opacity="0.49"/><circle cx="600" cy="594" r="4.0" fill="#d8ffb0" opacity="0.25"/><circle cx="130" cy="510" r="4.7" fill="#d8ffb0" opacity="0.50"/><circle cx="464" cy="207" r="4.4" fill="#d8ffb0" opacity="0.25"/><circle cx="285" cy="537" r="1.9" fill="#d8ffb0" opacity="0.24"/><circle cx="599" cy="136" r="3.9" fill="#d8ffb0" opacity="0.56"/><circle cx="94" cy="558" r="2.1" fill="#d8ffb0" opacity="0.44"/><circle cx="463" cy="140" r="1.9" fill="#d8ffb0" opacity="0.64"/><circle cx="452" cy="156" r="4.4" fill="#d8ffb0" opacity="0.50"/>
  <rect width="640" height="880" fill="url(#vig)"/>
</svg>
