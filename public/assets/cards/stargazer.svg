      <path d="M486 460 L462 448 L462 472 Z" fill="#ffe789" filter="url(#glowS)"/>
    </g>
  <circle cx="234" cy="287" r="2.2" fill="#fff4c2" opacity="0.24"/><circle cx="540" cy="111" r="2.8" fill="#fff4c2" opacity="0.37"/><circle cx="407" cy="141" r="2.2" fill="#fff4c2" opacity="0.40"/><circle cx="524" cy="454" r="1.9" fill="#fff4c2" opacity="0.19"/><circle cx="67" cy="416" r="1.9" fill="#fff4c2" opacity="0.39"/><circle cx="168" cy="167" r="3.2" fill="#fff4c2" opacity="0.27"/><circle cx="346" cy="408" r="2.7" fill="#fff4c2" opacity="0.61"/><circle cx="408" cy="625" r="4.1" fill="#fff4c2" opacity="0.29"/><circle cx="296" cy="286" r="3.7" fill="#fff4c2" opacity="0.39"/><circle cx="595" cy="440" r="2.2" fill="#fff4c2" opacity="0.20"/><circle cx="371" cy="358" r="1.6" fill="#fff4c2" opacity="0.38"/><circle cx="381" cy="147" r="3.4" fill="#fff4c2" opacity="0.20"/><circle cx="199" cy="669" r="2.3" fill="#fff4c2" opacity="0.47"/><circle cx="379" cy="614" r="3.9" fill="#fff4c2" opacity="0.31"/>
  <rect width="640" height="880" fill="url(#vig)"/>
</svg>
