      <path d="M486 460 L462 448 L462 472 Z" fill="#7cc4ff" filter="url(#glowS)"/>
    </g>
  <circle cx="391" cy="622" r="3.5" fill="#b3e6ff" opacity="0.56"/><circle cx="502" cy="179" r="2.5" fill="#b3e6ff" opacity="0.25"/><circle cx="294" cy="293" r="4.4" fill="#b3e6ff" opacity="0.22"/><circle cx="157" cy="432" r="2.7" fill="#b3e6ff" opacity="0.65"/><circle cx="138" cy="202" r="3.0" fill="#b3e6ff" opacity="0.25"/><circle cx="523" cy="673" r="3.7" fill="#b3e6ff" opacity="0.34"/><circle cx="390" cy="469" r="1.6" fill="#b3e6ff" opacity="0.61"/><circle cx="159" cy="408" r="2.9" fill="#b3e6ff" opacity="0.59"/><circle cx="297" cy="606" r="3.9" fill="#b3e6ff" opacity="0.48"/><circle cx="269" cy="514" r="3.5" fill="#b3e6ff" opacity="0.21"/><circle cx="237" cy="521" r="2.9" fill="#b3e6ff" opacity="0.52"/><circle cx="357" cy="281" r="3.8" fill="#b3e6ff" opacity="0.20"/><circle cx="473" cy="500" r="4.7" fill="#b3e6ff" opacity="0.59"/><circle cx="354" cy="642" r="4.2" fill="#b3e6ff" opacity="0.19"/>
  <rect width="640" height="880" fill="url(#vig)"/>
</svg>
