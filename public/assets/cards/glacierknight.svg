    <ellipse cx="232" cy="352" rx="42" ry="30" fill="#241b3d"/>
    <ellipse cx="408" cy="352" rx="42" ry="30" fill="#241b3d"/>
    <ellipse cx="232" cy="352" rx="42" ry="30" fill="none" stroke="#7cc4ff" stroke-width="3" opacity="0.4"/>
    <ellipse cx="408" cy="352" rx="42" ry="30" fill="none" stroke="#7cc4ff" stroke-width="3" opacity="0.4"/>
    <circle cx="320" cy="298" r="60" fill="url(#cloak)"/>
    <ellipse cx="320" cy="312" rx="42" ry="47" fill="#0c0918"/>
    <circle cx="301" cy="314" r="8" fill="#7cc4ff" filter="url(#glowF)"/>
    <circle cx="339" cy="314" r="8" fill="#7cc4ff" filter="url(#glowF)"/>
    
  </g>
  
    <g>
